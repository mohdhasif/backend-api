<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>♡</title>
  <style>
    :root{
      --neon1:#ff3cac; /* pink */
      --neon2:#784ba0; /* purple */
      --neon3:#2b86c5; /* cyan */
      --bg1:#0b0010; --bg2:#020008;
      --text:#fff5ff;
    }

    html,body{height:100%}
    body{
      margin:0; overflow:hidden; position:relative;
      background: radial-gradient(1200px 800px at 50% 20%, var(--bg1), var(--bg2) 60%);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color:var(--text);
    }

    /* starry twinkle */
    body::before{
      content:""; position:fixed; inset:0; pointer-events:none;
      background-image:
        radial-gradient(#ffffff1a 1px, transparent 1.2px),
        radial-gradient(#ffffff0d 1px, transparent 1.2px);
      background-size:3px 3px, 4px 4px; background-position:0 0, 2px 1px;
      animation: twinkle 30s linear infinite;
    }
    @keyframes twinkle{to{transform:translate3d(-24px,-32px,0)}}

    /* global defs once, reused everywhere */
    svg#defs { position:absolute; width:0; height:0; }

    .field{ position:fixed; inset:0; }

    .h{ position:absolute; left:calc(var(--x)*1vw); top:calc(var(--y)*1vh);
        width:calc(14vmin*var(--s)); height:auto; transform:translate(-50%,-50%) rotate(var(--rot));
        opacity:var(--o,0.85); filter:saturate(1.15);
        animation: float var(--d)s ease-in-out infinite; animation-delay: var(--delay,0s);
    }
    .h use{ fill:none; stroke:url(#g); stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round;
            filter:url(#glow-4); stroke-dasharray: 170 60; animation: dash 5.2s linear infinite;
            animation-delay: var(--delay,0s);
    }

    @keyframes float{ 0%,100%{ transform:translate(-50%,-50%) rotate(var(--rot)) }
                      50%    { transform:translate(-50%,calc(-50% - 12px)) rotate(calc(var(--rot) + 3deg)) } }
    @keyframes dash{ to{ stroke-dashoffset:-280 } }

    /* big centerpiece */
    .center{ position:fixed; inset:0; display:grid; place-items:center; pointer-events:none; }
    .big{ width:min(78vmin, 560px); height:auto; animation: hue 18s linear infinite, beat 1.9s ease-in-out infinite; }
    .big .outer{ stroke-width:12; opacity:.25; filter:url(#glow-8) }
    .big .mid  { stroke-width:7;  opacity:.6;  filter:url(#glow-4) }
    .big .core { stroke-width:3.2 }
    .big use{ fill:none; stroke:url(#g); stroke-linecap:round; stroke-linejoin:round; }
    @keyframes hue{ to{ filter:hue-rotate(360deg) } }
    @keyframes beat{ 50%{ transform:scale(1.06) } }

    /* names only */
    .names{
      position:fixed; inset:0; display:grid; place-items:center; text-align:center; pointer-events:none;
      font-weight:700; letter-spacing:.6px; line-height:1; text-transform:none;
      font-size: clamp(28px, 6.2vmin, 72px);
      background: linear-gradient(90deg, var(--neon1), var(--neon2), var(--neon3));
      -webkit-background-clip:text; background-clip:text; color:transparent;
      text-shadow: 0 0 10px #ff3cac55, 0 0 22px #784ba055, 0 0 30px #2b86c555;
      filter: drop-shadow(0 0 10px #ff3cac55) drop-shadow(0 0 16px #2b86c555);
      animation: glowText 3.2s ease-in-out infinite;
    }
    @keyframes glowText{ 50%{ text-shadow: 0 0 14px #ff3cac88, 0 0 28px #784ba088, 0 0 42px #2b86c588 } }

  </style>
</head>

  <!-- defs (gradients, filters, reusable heart path) -->
  <svg id="defs" viewBox="-60 -60 120 120" aria-hidden="true">
    <defs>
      <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"   stop-color="var(--neon1)"/>
        <stop offset="50%"  stop-color="var(--neon2)"/>
        <stop offset="100%" stop-color="var(--neon3)"/>
      </linearGradient>
      <filter id="glow-4"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="glow-8"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>

      <use href="#hp" class="core"/>
      <g filter="url(#glow-4)">
        <circle r="2" fill="#fff" opacity=".9">
